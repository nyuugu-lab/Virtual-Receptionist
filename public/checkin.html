<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Receptionist – Check In/Out</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    body { background: #f4f6fb; }
    .sidebar { width: 220px; min-height: 100vh; background: #1a1a2e; color: #eee; }
    .sidebar a { color: #cdd; text-decoration: none; display: block; padding: 10px 18px; border-radius: 6px; margin: 2px 8px; }
    .sidebar a:hover, .sidebar a.active { background: #16213e; color: #fff; }
    .sidebar .brand { font-size: 1.1rem; font-weight: 700; padding: 20px 18px 10px; }
  </style>
</head>
<body>
<div class="d-flex">
  <nav class="sidebar d-flex flex-column py-2">
    <div class="brand"><i class="bi bi-reception-4 me-2"></i>Receptionist</div>
    <hr class="border-secondary my-2 mx-3" />
    <a href="index.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
    <a href="customers.html"><i class="bi bi-people me-2"></i>Customers</a>
    <a href="appointments.html"><i class="bi bi-calendar3 me-2"></i>Appointments</a>
    <a href="checkin.html" class="active"><i class="bi bi-person-check me-2"></i>Check In/Out</a>
    <a href="services.html"><i class="bi bi-scissors me-2"></i>Services</a>
    <a href="technicians.html"><i class="bi bi-person-badge me-2"></i>Technicians</a>
    <a href="call-log.html"><i class="bi bi-telephone-inbound me-2"></i>Call Log</a>
  </nav>

  <main class="p-4 flex-fill">
    <h4 class="fw-semibold mb-4"><i class="bi bi-person-check me-2 text-success"></i>Customer Check In / Out</h4>

    <div class="row g-4">
      <!-- Check In Panel -->
      <div class="col-lg-5">
        <div class="card border-0 shadow-sm">
          <div class="card-header bg-success text-white fw-semibold">
            <i class="bi bi-box-arrow-in-right me-2"></i>Check In
          </div>
          <div class="card-body">
            <div class="mb-3">
              <label class="form-label">Search Customer</label>
              <input type="text" id="ciSearch" class="form-control" placeholder="Name or phone number…" autocomplete="off" />
              <div id="ciList" class="list-group mt-1" style="position:absolute;z-index:999;width:340px;max-height:200px;overflow-y:auto;"></div>
            </div>

            <div id="ciCustomerInfo" class="alert alert-info d-none mb-3" role="alert"></div>

            <div class="row g-2">
              <div class="col-12">
                <label class="form-label">Service</label>
                <select id="ciService" class="form-select">
                  <option value="">Walk-in (no service selected)</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">Technician</label>
                <select id="ciTech" class="form-select">
                  <option value="">Any available</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">Linked Appointment (optional)</label>
                <select id="ciAppt" class="form-select">
                  <option value="">Walk-in</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">Notes</label>
                <textarea id="ciNotes" class="form-control" rows="2"></textarea>
              </div>
            </div>

            <button class="btn btn-success w-100 mt-3" onclick="checkIn()">
              <i class="bi bi-box-arrow-in-right me-2"></i>Check In
            </button>
          </div>
        </div>
      </div>

      <!-- Currently In -->
      <div class="col-lg-7">
        <div class="card border-0 shadow-sm">
          <div class="card-header bg-primary text-white fw-semibold d-flex justify-content-between align-items-center">
            <span><i class="bi bi-people-fill me-2"></i>Currently Checked In</span>
            <button class="btn btn-sm btn-light" onclick="loadCurrent()"><i class="bi bi-arrow-clockwise"></i></button>
          </div>
          <div class="card-body p-0">
            <table class="table table-hover mb-0" id="currentTable">
              <thead class="table-light">
                <tr><th>Customer</th><th>Service</th><th>Tech</th><th>Time In</th><th>Action</th></tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Checkout Modal -->
<div class="modal fade" id="checkoutModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-warning">
        <h5 class="modal-title"><i class="bi bi-box-arrow-right me-2"></i>Check Out</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p id="coCustomerName" class="fw-semibold mb-3"></p>
        <input type="hidden" id="coVisitId" />
        <div class="mb-3">
          <label class="form-label">Total Amount ($)</label>
          <input type="number" id="coAmount" class="form-control" step="0.01" min="0" placeholder="0.00" />
          <div class="form-text">1 point will be earned per $1 spent</div>
        </div>
        <div class="mb-3">
          <label class="form-label">Service (if not set)</label>
          <select id="coService" class="form-select">
            <option value="">Keep existing</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Technician (if not set)</label>
          <select id="coTech" class="form-select">
            <option value="">Keep existing</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Notes</label>
          <textarea id="coNotes" class="form-control" rows="2"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-warning" onclick="checkOut()"><i class="bi bi-box-arrow-right me-2"></i>Check Out</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
  let ciCustomerId = null;
  let services = [], technicians = [];

  async function init() {
    [services, technicians] = await Promise.all([
      fetchJSON('/api/services'),
      fetchJSON('/api/technicians?active=true')
    ]);

    [document.getElementById('ciService'), document.getElementById('coService')].forEach(sel => {
      services.forEach(s => sel.insertAdjacentHTML('beforeend', `<option value="${s.id}">${s.name} – $${s.price}</option>`));
    });

    [document.getElementById('ciTech'), document.getElementById('coTech')].forEach(sel => {
      technicians.forEach(t => sel.insertAdjacentHTML('beforeend', `<option value="${t.id}">${t.name}</option>`));
    });

    loadCurrent();
  }

  // Customer search
  let timeout;
  document.getElementById('ciSearch').addEventListener('input', function () {
    clearTimeout(timeout);
    const q = this.value.trim();
    ciCustomerId = null;
    document.getElementById('ciCustomerInfo').classList.add('d-none');
    document.getElementById('ciAppt').innerHTML = '<option value="">Walk-in</option>';
    if (q.length < 2) { document.getElementById('ciList').innerHTML = ''; return; }
    timeout = setTimeout(async () => {
      const results = await fetchJSON(`/api/customers?q=${encodeURIComponent(q)}`);
      const list = document.getElementById('ciList');
      list.innerHTML = '';
      results.slice(0, 8).forEach(c => {
        const a = document.createElement('a');
        a.href = '#';
        a.className = 'list-group-item list-group-item-action';
        a.innerHTML = `<strong>${c.name}</strong> <span class="text-muted">${c.phone}</span>
          ${c.is_flagged ? '<span class="badge bg-warning text-dark ms-1">Flagged</span>' : ''}
          <span class="badge bg-primary ms-1">${c.points} pts</span>`;
        a.addEventListener('click', e => { e.preventDefault(); selectCustomer(c.id); });
        list.appendChild(a);
      });
    }, 300);
  });

  async function selectCustomer(id) {
    ciCustomerId = id;
    document.getElementById('ciList').innerHTML = '';
    const c = await fetchJSON(`/api/customers/${id}`);
    document.getElementById('ciSearch').value = `${c.name} (${c.phone})`;

    const infoEl = document.getElementById('ciCustomerInfo');
    infoEl.classList.remove('d-none');
    infoEl.innerHTML = `
      <strong>${c.name}</strong> – ${c.phone}<br/>
      Points: <strong>${c.points}</strong> &nbsp;|&nbsp;
      Preferred Tech: ${c.preferred_technician_name || 'None'}<br/>
      ${c.is_flagged ? `<span class="text-danger"><i class="bi bi-flag-fill me-1"></i>FLAGGED: ${c.flag_reason || 'Non-compliant'}</span>` : ''}`;

    // Load today's appointments for this customer
    const today = new Date().toISOString().slice(0, 10);
    const appts = await fetchJSON(`/api/appointments?customer_id=${id}&date=${today}&status=scheduled`);
    const apptSel = document.getElementById('ciAppt');
    apptSel.innerHTML = '<option value="">Walk-in</option>';
    appts.forEach(a => {
      apptSel.insertAdjacentHTML('beforeend',
        `<option value="${a.id}">${formatTime(a.scheduled_at)} – ${a.service_name} with ${a.technician_name}</option>`);
    });
    if (appts.length === 1) {
      apptSel.value = appts[0].id;
      document.getElementById('ciService').value = appts[0].service_id;
      // Find technician option matching appts[0].technician_id won't work without id; skip
    }
  }

  async function checkIn() {
    if (!ciCustomerId) { showToast('Please select a customer first', 'warning'); return; }
    const body = {
      customer_id: ciCustomerId,
      appointment_id: document.getElementById('ciAppt').value || null,
      service_id: document.getElementById('ciService').value || null,
      technician_id: document.getElementById('ciTech').value || null,
      notes: document.getElementById('ciNotes').value
    };
    try {
      const result = await fetchJSON('/api/visits/checkin', { method: 'POST', body: JSON.stringify(body) });
      let msg = `${result.visit.customer_name} checked in!`;
      if (result.warning) msg += ` ⚠️ ${result.warning}: ${result.flag_reason}`;
      showToast(msg, result.warning ? 'warning' : 'success');
      ciCustomerId = null;
      document.getElementById('ciSearch').value = '';
      document.getElementById('ciNotes').value = '';
      document.getElementById('ciCustomerInfo').classList.add('d-none');
      loadCurrent();
    } catch (e) { showToast(e.message, 'danger'); }
  }

  async function loadCurrent() {
    const visits = await fetchJSON('/api/visits/current');
    const tbody = document.querySelector('#currentTable tbody');
    tbody.innerHTML = '';
    if (visits.length) {
      visits.forEach(v => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${v.customer_name}<br/><small class="text-muted">${v.customer_phone}</small></td>
          <td>${v.service_name || '–'}</td>
          <td>${v.technician_name || '–'}</td>
          <td>${formatTime(v.checked_in_at)}</td>
          <td></td>`;
        const btn = document.createElement('button');
        btn.className = 'btn btn-sm btn-warning';
        btn.innerHTML = '<i class="bi bi-box-arrow-right me-1"></i>Check Out';
        btn.addEventListener('click', () => openCheckout(v.id, v.customer_name));
        tr.querySelector('td:last-child').appendChild(btn);
        tbody.appendChild(tr);
      });
    } else {
      tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-3">No customers currently checked in</td></tr>';
    }
  }

  function openCheckout(visitId, name) {
    document.getElementById('coVisitId').value = visitId;
    document.getElementById('coCustomerName').textContent = `Checking out: ${name}`;
    document.getElementById('coAmount').value = '';
    document.getElementById('coNotes').value = '';
    document.getElementById('coService').value = '';
    document.getElementById('coTech').value = '';
    new bootstrap.Modal(document.getElementById('checkoutModal')).show();
  }

  async function checkOut() {
    const visitId = document.getElementById('coVisitId').value;
    const body = {
      total_amount: parseFloat(document.getElementById('coAmount').value) || null,
      service_id: document.getElementById('coService').value || null,
      technician_id: document.getElementById('coTech').value || null,
      notes: document.getElementById('coNotes').value
    };
    try {
      const result = await fetchJSON(`/api/visits/${visitId}/checkout`, { method: 'PUT', body: JSON.stringify(body) });
      showToast(`Checked out! +${result.points_earned} points earned`);
      bootstrap.Modal.getInstance(document.getElementById('checkoutModal')).hide();
      loadCurrent();
    } catch (e) { showToast(e.message, 'danger'); }
  }

  init();
  setInterval(loadCurrent, 20000);
</script>
</body>
</html>
