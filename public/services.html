<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Receptionist – Services</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    body { background: #f4f6fb; }
    .sidebar { width: 220px; min-height: 100vh; background: #1a1a2e; color: #eee; }
    .sidebar a { color: #cdd; text-decoration: none; display: block; padding: 10px 18px; border-radius: 6px; margin: 2px 8px; }
    .sidebar a:hover, .sidebar a.active { background: #16213e; color: #fff; }
    .sidebar .brand { font-size: 1.1rem; font-weight: 700; padding: 20px 18px 10px; }
  </style>
</head>
<body>
<div class="d-flex">
  <nav class="sidebar d-flex flex-column py-2">
    <div class="brand"><i class="bi bi-reception-4 me-2"></i>Receptionist</div>
    <hr class="border-secondary my-2 mx-3" />
    <a href="index.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
    <a href="customers.html"><i class="bi bi-people me-2"></i>Customers</a>
    <a href="appointments.html"><i class="bi bi-calendar3 me-2"></i>Appointments</a>
    <a href="checkin.html"><i class="bi bi-person-check me-2"></i>Check In/Out</a>
    <a href="services.html" class="active"><i class="bi bi-scissors me-2"></i>Services</a>
    <a href="technicians.html"><i class="bi bi-person-badge me-2"></i>Technicians</a>
    <a href="call-log.html"><i class="bi bi-telephone-inbound me-2"></i>Call Log</a>
  </nav>

  <main class="p-4 flex-fill">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="fw-semibold mb-0"><i class="bi bi-scissors me-2 text-primary"></i>Services &amp; Pricing</h4>
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#serviceModal" onclick="openAdd()">
        <i class="bi bi-plus-lg me-1"></i>Add Service
      </button>
    </div>

    <div class="row g-3" id="servicesGrid"></div>
  </main>
</div>

<!-- Add/Edit Modal -->
<div class="modal fade" id="serviceModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="sModalTitle">Add Service</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="sEditId" />
        <div class="mb-3">
          <label class="form-label">Name *</label>
          <input type="text" id="sName" class="form-control" />
        </div>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea id="sDesc" class="form-control" rows="2"></textarea>
        </div>
        <div class="row g-2">
          <div class="col-md-6">
            <label class="form-label">Price ($) *</label>
            <input type="number" id="sPrice" class="form-control" step="0.01" min="0" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Duration (min)</label>
            <input type="number" id="sDuration" class="form-control" min="5" step="5" value="30" />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="saveService()">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
  async function loadServices() {
    const services = await fetchJSON('/api/services');
    const grid = document.getElementById('servicesGrid');
    grid.innerHTML = services.map(s => `
      <div class="col-md-4 col-lg-3">
        <div class="card border-0 shadow-sm h-100 ${s.is_active ? '' : 'opacity-50'}">
          <div class="card-body">
            <h6 class="fw-semibold mb-1">${s.name}</h6>
            <p class="text-muted small mb-2">${s.description || 'No description'}</p>
            <div class="d-flex justify-content-between align-items-center">
              <span class="fs-5 fw-bold text-success">$${s.price.toFixed(2)}</span>
              <span class="badge bg-secondary">${s.duration_minutes} min</span>
            </div>
          </div>
          <div class="card-footer bg-transparent d-flex gap-2">
            <button class="btn btn-sm btn-outline-primary flex-fill" onclick="openEdit(${s.id})">
              <i class="bi bi-pencil"></i>
            </button>
            <button class="btn btn-sm btn-outline-${s.is_active ? 'warning' : 'success'} flex-fill"
              onclick="toggleActive(${s.id}, ${s.is_active})">
              <i class="bi bi-${s.is_active ? 'pause' : 'play'}"></i>
            </button>
            <button class="btn btn-sm btn-outline-danger flex-fill" onclick="deleteService(${s.id})">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </div>
      </div>`).join('');
  }

  function openAdd() {
    document.getElementById('sModalTitle').textContent = 'Add Service';
    document.getElementById('sEditId').value = '';
    document.getElementById('sName').value = '';
    document.getElementById('sDesc').value = '';
    document.getElementById('sPrice').value = '';
    document.getElementById('sDuration').value = '30';
  }

  async function openEdit(id) {
    const s = await fetchJSON(`/api/services/${id}`);
    document.getElementById('sModalTitle').textContent = 'Edit Service';
    document.getElementById('sEditId').value = s.id;
    document.getElementById('sName').value = s.name;
    document.getElementById('sDesc').value = s.description || '';
    document.getElementById('sPrice').value = s.price;
    document.getElementById('sDuration').value = s.duration_minutes;
    new bootstrap.Modal(document.getElementById('serviceModal')).show();
  }

  async function saveService() {
    const id = document.getElementById('sEditId').value;
    const body = {
      name: document.getElementById('sName').value,
      description: document.getElementById('sDesc').value,
      price: parseFloat(document.getElementById('sPrice').value),
      duration_minutes: parseInt(document.getElementById('sDuration').value)
    };
    try {
      if (id) {
        await fetchJSON(`/api/services/${id}`, { method: 'PUT', body: JSON.stringify(body) });
        showToast('Service updated');
      } else {
        await fetchJSON('/api/services', { method: 'POST', body: JSON.stringify(body) });
        showToast('Service added');
      }
      bootstrap.Modal.getInstance(document.getElementById('serviceModal')).hide();
      loadServices();
    } catch (e) { showToast(e.message, 'danger'); }
  }

  async function toggleActive(id, current) {
    await fetchJSON(`/api/services/${id}`, { method: 'PUT', body: JSON.stringify({ is_active: !current }) });
    showToast(current ? 'Service deactivated' : 'Service activated');
    loadServices();
  }

  async function deleteService(id) {
    if (!confirm('Delete this service?')) return;
    try {
      await fetchJSON(`/api/services/${id}`, { method: 'DELETE' });
      showToast('Service deleted', 'warning');
      loadServices();
    } catch (e) { showToast(e.message, 'danger'); }
  }

  loadServices();
</script>
</body>
</html>
