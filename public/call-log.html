<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Receptionist – Call Log</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    body { background: #f4f6fb; }
    .sidebar { width: 220px; min-height: 100vh; background: #1a1a2e; color: #eee; }
    .sidebar a { color: #cdd; text-decoration: none; display: block; padding: 10px 18px; border-radius: 6px; margin: 2px 8px; }
    .sidebar a:hover, .sidebar a.active { background: #16213e; color: #fff; }
    .sidebar .brand { font-size: 1.1rem; font-weight: 700; padding: 20px 18px 10px; }
  </style>
</head>
<body>
<div class="d-flex">
  <nav class="sidebar d-flex flex-column py-2">
    <div class="brand"><i class="bi bi-reception-4 me-2"></i>Receptionist</div>
    <hr class="border-secondary my-2 mx-3" />
    <a href="index.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
    <a href="customers.html"><i class="bi bi-people me-2"></i>Customers</a>
    <a href="appointments.html"><i class="bi bi-calendar3 me-2"></i>Appointments</a>
    <a href="checkin.html"><i class="bi bi-person-check me-2"></i>Check In/Out</a>
    <a href="services.html"><i class="bi bi-scissors me-2"></i>Services</a>
    <a href="technicians.html"><i class="bi bi-person-badge me-2"></i>Technicians</a>
    <a href="call-log.html" class="active"><i class="bi bi-telephone-inbound me-2"></i>Call Log</a>
  </nav>

  <main class="p-4 flex-fill">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="fw-semibold mb-0"><i class="bi bi-telephone-inbound me-2 text-primary"></i>Call Log</h4>
      <button class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#manualCallModal">
        <i class="bi bi-plus-lg me-1"></i>Log Manual Call
      </button>
    </div>

    <div class="card border-0 shadow-sm">
      <div class="card-body p-0">
        <table class="table table-hover mb-0" id="callTable">
          <thead class="table-light">
            <tr>
              <th>Date/Time</th>
              <th>Caller Number</th>
              <th>Customer</th>
              <th>Action</th>
              <th>Duration</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Manual Call Log Modal -->
<div class="modal fade" id="manualCallModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Log Manual Call</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Caller Number</label>
          <input type="tel" id="mcPhone" class="form-control" placeholder="+1 555-0100" />
        </div>
        <div class="mb-3">
          <label class="form-label">Action / Purpose</label>
          <select id="mcAction" class="form-select">
            <option value="inquiry">Inquiry</option>
            <option value="appointment">Appointment</option>
            <option value="cancellation">Cancellation</option>
            <option value="complaint">Complaint</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Duration (seconds)</label>
          <input type="number" id="mcDuration" class="form-control" min="0" />
        </div>
        <div class="mb-3">
          <label class="form-label">Notes</label>
          <textarea id="mcNotes" class="form-control" rows="3"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="logManualCall()">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
  async function loadCallLog() {
    const logs = await fetchJSON('/api/calls/logs?limit=100');
    const tbody = document.querySelector('#callTable tbody');

    const actionBadge = (a) => ({
      incoming: 'bg-info',
      inquiry: 'bg-secondary',
      appointment: 'bg-primary',
      schedule_request: 'bg-primary',
      points_inquiry: 'bg-success',
      cancellation: 'bg-danger',
      complaint: 'bg-warning text-dark',
      manual: 'bg-light text-dark border',
      other: 'bg-secondary'
    })[a] || 'bg-secondary';

    tbody.innerHTML = logs.length
      ? logs.map(l => `<tr>
          <td>${formatDateTime(l.created_at)}</td>
          <td>${l.caller_number || '–'}</td>
          <td>${l.customer_name || '<span class="text-muted">Unknown</span>'}</td>
          <td><span class="badge ${actionBadge(l.action)}">${l.action || 'unknown'}</span></td>
          <td>${l.duration ? l.duration + 's' : '–'}</td>
          <td><small>${l.notes || ''}</small></td>
        </tr>`).join('')
      : '<tr><td colspan="6" class="text-center text-muted py-3">No calls logged yet</td></tr>';
  }

  async function logManualCall() {
    const body = {
      caller_number: document.getElementById('mcPhone').value,
      action: document.getElementById('mcAction').value,
      duration: parseInt(document.getElementById('mcDuration').value) || null,
      notes: document.getElementById('mcNotes').value
    };
    try {
      await fetchJSON('/api/calls/log', { method: 'POST', body: JSON.stringify(body) });
      showToast('Call logged');
      bootstrap.Modal.getInstance(document.getElementById('manualCallModal')).hide();
      loadCallLog();
    } catch (e) { showToast(e.message, 'danger'); }
  }

  loadCallLog();
</script>
</body>
</html>
