<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Select Services</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="kiosk-body">
  <div class="card services-card">
    <h1>💅 Select Services</h1>
    <p>Choose all that apply, then tap <strong>Confirm</strong>.</p>

    <form action="/kiosk/services" method="POST">
      <input type="hidden" name="id" id="visitor-id" value="" />
      <div class="service-grid" id="service-grid">
        <p>Loading services...</p>
      </div>
      <button type="submit" id="confirm-btn">Confirm Check-In</button>
    </form>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (id) document.getElementById('visitor-id').value = id;

    fetch('/api/services')
      .then(r => r.json())
      .then(services => {
        const grid = document.getElementById('service-grid');
        if (!services.length) {
          grid.innerHTML = '<p>No services available.</p>';
          return;
        }
        grid.innerHTML = services.map(s => `
          <label class="service-item">
            <input type="checkbox" name="services" value="${s.name}" />
            <span>${s.emoji} ${s.name}</span>
          </label>
        `).join('');
      });
  </script>
</body>
</html>
