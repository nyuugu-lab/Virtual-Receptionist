<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Inspire Nails Bar — Check-In</title>
  <link rel="stylesheet" href="/style.css" />

  <!-- PWA / iPad Home Screen settings -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Inspire Nails Bar" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#2d3748" />

  <!-- App icon for iPad home screen -->
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
</head>
<body class="kiosk-body">
  <div class="card">
    <h1>👋 Welcome to Inspire Nails Bar!</h1>
    <p>Please sign in below.</p>

    <div id="msg"></div>

    <form action="/kiosk/checkin" method="POST">
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="Jane Smith" required autocomplete="off" />

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone" placeholder="555-123-4567" required autocomplete="off" />

      <button type="submit">Check In</button>
    </form>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const msg = document.getElementById('msg');
    if (params.get('success')) {
      msg.className = 'alert success';
      msg.textContent = '✅ You are checked in! Please have a seat.';
    } else if (params.get('error')) {
      msg.className = 'alert error';
      msg.textContent = '⚠️ Please enter your name and phone number.';
    }
  </script>
</body>
</html>
